<header id="site-header">
    <div class="site-wrapper">
        <div id="site-banner">
            <h1 id="site-title">{{ config.title }}</h1>
        </div>
        <nav id="site-navbar">
            <ul class="nav-list">
                {%- for page in collections.page -%}
                <li class="nav-item"><a class="nav-link simple-link" href="{{page.url}}">{{ page.data.title }}</a></li>
                {%- endfor -%}
            </ul>
        </nav>
    </div>
</header>
